apiVersion: v1
kind: ConfigMap
metadata:
  name: mythos-bot-config
  labels:
    app: mythos-bot
data:
  ENGINE_PATH: /app/engine/mythos
  WEIGHTS_PATH: ""
  ENGINE_HASH_MB: "64"
  ENGINE_THREADS: "1"
  MAX_CONCURRENT_GAMES: "4"
  MOVE_TIMEOUT_SEC: "20"
  STREAM_BACKOFF_MIN_SEC: "1"
  STREAM_BACKOFF_MAX_SEC: "30"
  CONNECT_TIMEOUT_SEC: "15"
  READ_TIMEOUT_SEC: "90"
  METRICS_HOST: "0.0.0.0"
  METRICS_PORT: "8080"
  ACCEPTED_VARIANTS: "standard"
  ACCEPTED_SPEEDS: "bullet,blitz,rapid"
  MIN_INITIAL_SECONDS: "0"
  MAX_INITIAL_SECONDS: "1800"
  MAX_INCREMENT_SECONDS: "30"
  LOG_LEVEL: "INFO"
---
apiVersion: v1
kind: Service
metadata:
  name: mythos-bot
  labels:
    app: mythos-bot
spec:
  selector:
    app: mythos-bot
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mythos-bot
  labels:
    app: mythos-bot
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mythos-bot
  template:
    metadata:
      labels:
        app: mythos-bot
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: bot
          image: mythos-bot:1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: mythos-bot-config
          env:
            - name: LICHESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mythos-bot-secret
                  key: lichess-token
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mythos-bot
  labels:
    app: mythos-bot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mythos-bot
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
